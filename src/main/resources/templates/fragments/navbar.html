<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="navbar" class="top-navbar">
  <div class="logo">
    <h2 style="text-transform: uppercase; letter-spacing: 2px; font-weight: 900;">CHESS GAME</h2>
  </div>

  <ul class="menu-items">
    <li style="border-radius: 0;"><a th:href="@{/}" style="color: inherit; text-decoration: none; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;">Sảnh cờ</a></li>
    <li style="border-radius: 0;"><a th:href="@{/settings}" style="color: inherit; text-decoration: none; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;">Cài đặt</a></li>
  </ul>

  <div class="header-right-group">
    <div class="auth-buttons" th:if="${session.currentPlayer == null}">
      <a th:href="@{/login}" class="btn-login" style="border-radius: 0; text-transform: uppercase; letter-spacing: 1px;">Đăng nhập</a>
      <a th:href="@{/register}" class="btn-register" style="border-radius: 0; text-transform: uppercase; letter-spacing: 1px;">Đăng ký</a>
    </div>

    <a th:href="@{/admin/users}"
       th:if="${session.currentPlayer != null and session.currentPlayer.role == 'ROLE_ADMIN'}"
       style="display: inline-block; padding: 10px 20px; margin-right: 15px; color: #f44336; border: 1px solid #f44336; border-radius: 5px; text-decoration: none; font-weight: bold; transition: all 0.3s;">
       QUẢN TRỊ VIÊN
    </a>

    <a th:href="@{/profile}" class="user-profile" th:if="${session.currentPlayer != null}" style="text-decoration: none; color: inherit; border-radius: 0; border: 1px solid rgba(255,255,255,0.2);">
      <div class="info" style="text-align: right;">
        <span class="name" th:text="${session.currentPlayer.username}" style="text-transform: uppercase; letter-spacing: 1px; font-size: 13px;">USER</span>
        <span class="elo" th:text="${session.currentPlayer.eloRating} + ' ELO'" style="letter-spacing: 1px;">1200 ELO</span>
      </div>
      <div class="avatar" style="font-size: 14px; font-weight: bold; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 10px; margin-left: 5px;">HỒ SƠ</div>
    </a>
  </div>
</header>
</body>
</html>
