<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="navbar" class="top-navbar browser-style-nav">

  <div class="logo">
    <h2 style="text-transform: uppercase; letter-spacing: 1px; font-weight: 900;">
      <span class="logo-icon">♟️</span> <span class="logo-text">Chess Pro</span>
    </h2>
  </div>

  <ul class="menu-items">
    <li><a th:href="@{/}">Sảnh</a></li>
    <li><a th:href="@{/settings}">Cài đặt</a></li>
  </ul>

  <div class="header-right-group header-right-group-compact">

    <div class="auth-buttons" th:if="${session.currentPlayer == null}">
      <a th:href="@{/login}" class="btn-login" style="border-radius: 4px; padding: 6px 12px; font-size: 12px;">Đăng nhập</a>
    </div>

    <a th:href="@{/admin/users}"
       th:if="${session.currentPlayer != null and session.currentPlayer.role == 'ROLE_ADMIN'}"
       class="btn-admin-compact" title="Quản trị viên">
      <span style="font-size: 16px; margin-top: 1px;">⚙️</span>
      <span class="admin-text">ADMIN</span>
    </a>

    <a th:href="@{/profile}" class="user-profile profile-compact" th:if="${session.currentPlayer != null}" style="text-decoration: none; color: inherit; display: flex; align-items: center;">
      <div class="info" style="text-align: right;">
        <span class="name" th:text="${session.currentPlayer.username}" style="text-transform: uppercase; letter-spacing: 1px; font-size: 12px;">USER</span>
        <span class="elo" th:text="${session.currentPlayer.eloRating} + ' ELO'" style="letter-spacing: 1px; font-size: 10px; color: #aaa;">1200 ELO</span>
      </div>
      <div class="avatar" style="font-size: 18px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 8px; margin-left: 8px;">👤</div>
    </a>

  </div>
</header>
</body>
</html>
