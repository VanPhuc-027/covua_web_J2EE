<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-container">
    <h2>Đăng Nhập</h2>

    <div th:if="${message}" style="color: #4caf50; background: rgba(76, 175, 80, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid rgba(76, 175, 80, 0.3); text-align: center;">
        <span th:text="${message}"></span>
    </div>

    <div th:if="${error}" style="color: #f44336; background: rgba(244, 67, 54, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid rgba(244, 67, 54, 0.3); text-align: center;">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${param.error != null and #strings.equals(param.error, 'banned')}" style="color: #f44336; background: rgba(244, 67, 54, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid rgba(244, 67, 54, 0.3); text-align: center; font-weight: bold;">
        ⚠️ Tài khoản của bạn đã bị khóa!
    </div>

    <form th:action="@{/login}" method="post" id="loginForm">
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                <button type="button" class="eye-btn" onclick="togglePassword('password', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-submit">Đăng Nhập</button>
    </form>

    <div class="auth-footer">
        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
    </div>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
