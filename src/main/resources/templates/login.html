<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="auth-container">
        <h2>Đăng Nhập</h2>

        <div th:if="${message}" 
             style="color: #4caf50; background: rgba(76, 175, 80, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; border: 1px solid rgba(76, 175, 80, 0.3); text-align: center;">
            <span th:text="${message}"></span>
        </div>

        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn-submit">Đăng Nhập</button>
        </form>

        <div class="auth-footer">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
        
        <div class="auth-footer" style="margin-top: 10px;">
            <a th:href="@{/}" style="font-size: 0.8rem; color: #888;">← Quay lại bàn cờ</a>
        </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
</body>
</html>
