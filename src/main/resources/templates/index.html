<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Cờ Vua</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="top-navbar">
    <div class="logo">
        <h2>♟️ Chess Pro</h2>
    </div>

    <ul class="menu-items">
        <li class="active">Chơi cờ</li>
        <li>Cài đặt</li>
    </ul>

    <div class="user-profile">
        <div class="info">
            <span class="name">Khách</span>
            <span class="elo">Chưa xếp hạng</span>
        </div>
        <div class="avatar">👤</div>
    </div>
</header>

<main class="main-content">

    <div class="board-container">
        <div class="chessboard">
            <div th:each="rowArray : ${board.boxes}" class="row">
                <div th:each="spot : ${rowArray}"
                     th:classappend="${(spot.row + spot.col) % 2 == 0 ? 'light' : 'dark'}"
                     th:attr="data-row=${spot.row},data-col=${spot.col}"
                     class="square">
                    <img th:if="${spot.piece != null}"
                         th:src="@{${spot.piece.iconPath}}"
                         alt="chess-piece">
                </div>
            </div>
        </div>
    </div>

    <aside class="right-panel">

        <div class="game-info">
            <div class="player opponent">
                <div class="avatar">🤖</div>
                <div class="details">
                    <span class="name">Đối thủ</span>
                    <span class="time">10:00</span>
                </div>
            </div>

            <div class="match-status">
                <span>Trận đấu đang diễn ra...</span>
            </div>

            <div class="player you">
                <div class="avatar">👤</div>
                <div class="details">
                    <span class="name">Bạn</span>
                    <span class="time">10:00</span>
                </div>
            </div>
        </div>

        <div class="move-history">
            <div class="history-header">Lịch sử nước đi</div>
            <div class="moves-list">
                <div class="move-row">
                    <span class="move-num">1.</span>
                    <span class="move-white">e4</span>
                    <span class="move-black">e5</span>
                </div>
                <div class="move-row">
                    <span class="move-num">2.</span>
                    <span class="move-white">Nf3</span>
                    <span class="move-black">Nc6</span>
                </div>
                <div class="move-row">
                    <span class="move-num">3.</span>
                    <span class="move-white">Bc4</span>
                    <span class="move-black">Bc5</span>
                </div>
            </div>
        </div>

        <div class="chat-box">
            <div class="chat-header">Trò chuyện</div>
            <div class="chat-messages">
                <div class="message system">Chào mừng bạn đến với bàn cờ!</div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Nhập tin nhắn...">
                <button>Gửi</button>
            </div>
        </div>

    </aside>

</main>

<script th:src="@{/js/game.js}"></script>

</body>
</html>
