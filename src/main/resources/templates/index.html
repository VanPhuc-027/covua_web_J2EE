<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sảnh Chờ - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="lobby-content">
    <div class="lobby-main">
        <div class="lobby-actions" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; border-radius: 0;">
            <h3 style="margin: 0; text-transform: uppercase; letter-spacing: 1px; font-weight: normal;">DANH SÁCH PHÒNG CHỜ</h3>
            <form th:action="@{/game/create}" method="post" style="margin: 0;">
                <button type="submit" style="background-color: #4caf50; color: white; border: none; border-radius: 0; padding: 10px 20px; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease; box-shadow: 2px 2px 0px rgba(0,0,0,0.5);"
                        onmouseover="this.style.backgroundColor='#45a049'; this.style.transform='translate(-2px, -2px)'; this.style.boxShadow='4px 4px 0px rgba(0,0,0,0.6)';"
                        onmouseout="this.style.backgroundColor='#4caf50'; this.style.transform='translate(0, 0)'; this.style.boxShadow='2px 2px 0px rgba(0,0,0,0.5)';">
                    TẠO PHÒNG MỚI
                </button>
            </form>
        </div>

        <div class="room-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px;">
            <div class="room-card" th:each="game : ${waitingGames}" style="background: rgba(0, 0, 0, 0.4); border-radius: 0; padding: 18px; border: 1px solid rgba(76, 175, 80, 0.3); position: relative;">
                <div style="position: absolute; top: 18px; right: 18px; font-size: 12px; font-weight: bold; padding: 4px 8px; border: 1px solid; letter-spacing: 1px;"
                     th:styleappend="${game.status.name() == 'WAITING'} ? 'color: #4caf50; border-color: #4caf50;' : 'color: #f44336; border-color: #f44336;'"
                     th:text="${game.status.name() == 'WAITING' ? '1/2' : '2/2'}">
                </div>
                <div class="room-info" style="margin-bottom: 15px;">
                    <div style="font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">
                        CHỦ PHÒNG
                    </div>
                    <div style="font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 15px; text-transform: uppercase;">
                        <span th:text="${game.whitePlayer != null ? game.whitePlayer.username : game.blackPlayer.username}">USERNAME</span>
                    </div>
                    <div style="font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                        CHẾ ĐỘ: <span th:text="${game.gameMode}" style="color: #ccc;">PLAYER_VS_PLAYER</span>
                    </div>
                </div>
                <form th:if="${game.status.name() == 'WAITING'}" th:action="@{/game/join}" method="post" style="margin: 0;">
                    <input type="hidden" name="gameId" th:value="${game.id}">
                    <button type="submit" style="width: 100%; background-color: transparent; color: #4caf50; border: 1px solid #4caf50; border-radius: 0; padding: 10px; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease;"
                            onmouseover="this.style.backgroundColor='#4caf50'; this.style.color='#fff';"
                            onmouseout="this.style.backgroundColor='transparent'; this.style.color='#4caf50';">
                        VÀO CHƠI
                    </button>
                </form>
                <div th:if="${game.status.name() == 'IN_PROGRESS'}" style="width: 100%; background-color: rgba(255,255,255,0.05); color: #888; border: 1px solid #555; border-radius: 0; padding: 10px; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; text-align: center; box-sizing: border-box; cursor: not-allowed;">
                    ĐANG CHƠI
                </div>
            </div>
            <div th:if="${#lists.isEmpty(waitingGames)}" style="color: #888; padding: 40px 20px; text-align: center; background: rgba(0, 0, 0, 0.2); border-radius: 0; grid-column: 1 / -1; border: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; letter-spacing: 1px; font-size: 13px;">
                Chưa có phòng nào. Hãy là người đầu tiên tạo phòng.
            </div>
        </div>
    </div>

    <aside class="leaderboard-panel" style="height: fit-content; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 0;">
        <h3 style="margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-weight: normal; font-size: 15px;">BẢNG XẾP HẠNG</h3>
        <ul class="ranking-list">
            <li class="ranking-item" th:each="player, iterStat : ${topPlayers}" style="border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 0;">
                <span class="rank" th:text="${iterStat.count}">1</span>
                <span class="name" th:text="${player.username}" style="text-transform: uppercase; letter-spacing: 1px;">USER</span>
                <span class="elo" th:text="${player.eloRating}">1200</span>
            </li>
        </ul>
    </aside>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var currentUsername = /*[[${session.currentPlayer != null ? session.currentPlayer.username : 'guest'}]]*/ 'guest';
    currentUsername = String(currentUsername).trim();
    /*]]>*/
    document.addEventListener("DOMContentLoaded", function () {
        var socket = new SockJS('/ws');
        var stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/lobby', function (message) {
                const payload = message.body;
                if (payload.startsWith("ROOM_CREATED:") ||
                    payload.startsWith("ROOM_CANCELLED:") ||
                    payload.startsWith("RELOAD_LOBBY:")) {
                    const actorName = payload.split(":")[1].trim();
                    if (actorName !== currentUsername) {
                        window.location.reload();
                    }
                }
            });
        }, function(error) {
            console.error('Lỗi kết nối WebSocket: ', error);
        });
    });
</script>
</body>
</html>
