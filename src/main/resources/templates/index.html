<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Cờ Vua Spring Boot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Chess Game</h1>

<div class="chessboard">
    <div th:each="row : ${#numbers.sequence(0, 7)}" class="row">

        <div th:each="col : ${#numbers.sequence(0, 7)}"
             th:classappend="${(row + col) % 2 == 0 ? 'light' : 'dark'}"
             class="square">
        </div>

    </div>
</div>
</body>
</html>
