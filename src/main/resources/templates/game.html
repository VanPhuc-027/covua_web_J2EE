<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bàn Cờ - Chess Pro</title>
    <!-- CSS chính của bạn -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* CSS bổ trợ cho Chế độ tập trung (Focus Mode) */
        body.focus-mode-active .top-navbar,
        body.focus-mode-active .right-panel {
            opacity: 0.1;
            pointer-events: none; /* Không cho click vào khi đang tập trung */
            transition: opacity 0.5s ease;
        }

        body.focus-mode-active .board-container {
            transform: scale(1.05); /* Phóng to bàn cờ một chút */
            transition: transform 0.5s ease;
        }

        /* Class để highlight ô cờ khi bật Gợi ý */
        .square.hint {
            position: relative;
        }
        .square.hint::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(0, 255, 0, 0.4);
            border-radius: 50%;
            top: 35%;
            left: 35%;
        }
    </style>
</head>
<body>

<header class="top-navbar">
    <div class="logo">
        <h2>♟️ Chess Pro</h2>
    </div>

    <ul class="menu-items">
        <!-- Chế độ Đang chờ -->
        <li th:if="${game.status.name() == 'WAITING'}">
            <form th:action="@{/game/cancel}" method="post" style="margin: 0;">
                <input type="hidden" name="gameId" th:value="${game.id}" />
                <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer;">
                    🔙 Hủy phòng & Về sảnh
                </button>
            </form>
        </li>
        <!-- Chế độ Đang diễn ra -->
        <li th:if="${game.status.name() == 'IN_PROGRESS'}">
            <span style="color: #ff4d4d; font-weight: bold;">🚫 Trận đấu đang diễn ra</span>
        </li>
    </ul>

    <div class="header-right-group">
        <div class="user-profile" th:if="${currentPlayer != null}">
            <div class="info">
                <span class="name" th:text="${currentPlayer.username}">User</span>
                <span class="elo" th:text="${currentPlayer.eloRating} + ' Elo'">1200 Elo</span>
            </div>
            <div class="avatar">👤</div>
        </div>
    </div>
</header>

<main class="main-content">
    <div class="board-container">
        <!-- Overlay khi chờ đối thủ -->
        <div th:if="${game.status.name() == 'WAITING'}" class="waiting-overlay">
            <h2 class="waiting-text">⏳ Đang chờ đối thủ...</h2>
        </div>

        <div class="chessboard" id="main-chessboard">
            <div th:each="rowArray : ${board.boxes}" class="row">
                <div th:each="spot : ${rowArray}"
                     th:classappend="${(spot.row + spot.col) % 2 == 0 ? 'light' : 'dark'}"
                     th:attr="data-row=${spot.row},data-col=${spot.col}"
                     class="square">
                    <img th:if="${spot.piece != null}"
                         th:src="@{${spot.piece.iconPath}}"
                         class="chess-piece">
                </div>
            </div>
        </div>
    </div>

    <aside class="right-panel">
        <div class="game-info">
            <div class="player opponent">
                <div class="avatar">🤖</div>
                <div class="details">
                    <span class="name" th:text="${opponentName}">Đối thủ</span>
                    <span class="time" id="timer-opponent">10:00</span>
                </div>
            </div>

            <div class="match-status" th:text="${game.status}">STATUS</div>

            <div class="player you">
                <div class="avatar">👤</div>
                <div class="details">
                    <span class="name" th:text="${currentPlayer.username}">Bạn</span>
                    <span class="time" id="timer-you">10:00</span>
                </div>
            </div>
        </div>

        <!-- Các nút hành động -->
        <div class="game-actions" th:if="${game.status.name() == 'IN_PROGRESS'}">
            <button id="btn-draw" class="action-btn">🤝 Cầu hòa</button>
            <button id="btn-resign" class="action-btn resign">🏳️ Đầu hàng</button>
        </div>

        <!-- Chat và Lịch sử -->
        <div class="chat-box">
            <div class="chat-header">Trò chuyện</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Nhập tin nhắn...">
                <button id="btn-send-chat">Gửi</button>
            </div>
        </div>
    </aside>
</main>

<!-- Audio cho ván cờ -->
<audio id="move-sound" th:src="@{/sounds/move.mp3}" preload="auto"></audio>
<audio id="capture-sound" th:src="@{/sounds/capture.mp3}" preload="auto"></audio>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    window.CHESS_CONFIG = {
        gameId: /*[[${game.id}]]*/ 'default',
        username: /*[[${currentPlayer.username}]]*/ 'guest',
        isSound: localStorage.getItem('chess_sound') !== 'false',
        isHints: localStorage.getItem('chess_hints') !== 'false',
        isFocus: localStorage.getItem('chess_focus') === 'true'
    };
    if (window.CHESS_CONFIG.isFocus) {
        document.body.classList.add('focus-mode-active');
    }
    window.playSound = function(type) {
        if (!window.CHESS_CONFIG.isSound) return;
        const sound = document.getElementById(type === 'capture' ? 'capture-sound' : 'move-sound');
        if (sound) sound.play().catch(() => {});
    };
</script>

<script th:src="@{/js/socket.js}"></script>
<script th:src="@{/js/game.js}"></script>

</body>
</html>
