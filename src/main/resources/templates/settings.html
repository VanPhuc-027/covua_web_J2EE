<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cài đặt - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="lobby-content admin-content">
    <div class="settings-box">

        <div class="settings-header">
            <h3>CÀI ĐẶT HỆ THỐNG</h3>
        </div>

        <div class="setting-item">
            <div class="setting-label">
                Âm thanh ván cờ
                <span class="setting-desc">Phát tiếng khi di chuyển hoặc ăn quân</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggleSound">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <div class="setting-label">
                Hiển thị gợi ý
                <span class="setting-desc">Đánh dấu các ô hợp lệ khi bấm vào quân cờ</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggleHints">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
            <div class="setting-label">
                Chế độ tập trung
                <span class="setting-desc">Làm mờ nền xung quanh bàn cờ</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggleFocus">
                <span class="slider"></span>
            </label>
        </div>

        <button onclick="saveSettings()" class="btn-submit-settings">LƯU CÀI ĐẶT</button>

    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const soundEnabled = localStorage.getItem('chess_sound') !== 'false';
        const hintsEnabled = localStorage.getItem('chess_hints') !== 'false';
        const focusEnabled = localStorage.getItem('chess_focus') === 'true';

        document.getElementById('toggleSound').checked = soundEnabled;
        document.getElementById('toggleHints').checked = hintsEnabled;
        document.getElementById('toggleFocus').checked = focusEnabled;
    });

    function saveSettings() {
        const soundEnabled = document.getElementById('toggleSound').checked;
        const hintsEnabled = document.getElementById('toggleHints').checked;
        const focusEnabled = document.getElementById('toggleFocus').checked;

        localStorage.setItem('chess_sound', soundEnabled);
        localStorage.setItem('chess_hints', hintsEnabled);
        localStorage.setItem('chess_focus', focusEnabled);

        const btn = document.querySelector('.btn-submit-settings');
        const originalText = btn.innerText;
        btn.innerText = "ĐÃ LƯU ✓";
        btn.style.backgroundColor = "#45a049";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.backgroundColor = "";
        }, 1500);
    }
</script>
</body>
</html>
