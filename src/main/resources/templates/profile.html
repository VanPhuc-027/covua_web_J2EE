<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-container profile-container" style="border: 1px solid var(--neon-green); box-shadow: 0 0 20px var(--neon-green-glow);">
    <div class="profile-info">

        <div class="avatar-circle neon" th:text="${#strings.substring(currentPlayer.username,0,1).toUpperCase()}">G</div>

        <h2 class="neon-text" th:text="${currentPlayer.username}">Tên người dùng</h2>
        <p style="color: #aaa; font-size: 1rem; margin-top: -10px;">Hạng: <span style="color: white; font-weight: bold;" th:text="${currentPlayer.eloRating >= 1500 ? 'Cao thủ' : 'Tân binh'}"></span></p>

        <div class="stats neon">
            <div class="stat-item">
                <strong class="neon-green">0</strong>
                <span>Thắng</span>
            </div>
            <div class="stat-item">
                <strong class="neon-green">0</strong>
                <span>Thua</span>
            </div>
            <div class="stat-item">
                <strong class="neon-green" th:text="${currentPlayer.eloRating}">1200</strong>
                <span>Elo</span>
            </div>
        </div>

        <a th:href="@{/logout}" class="btn-neon-logout">Đăng xuất</a>

        <a th:href="@{/}" class="link-neon-back">
            ← Quay lại bàn cờ
        </a>
    </div>
</div>
</body>
</html>
