<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <style>
        .profile-info { text-align: center; }
        .avatar-circle {
            width: 100px; height: 100px;
            background: #4caf50; /* Sử dụng màu xanh chủ đạo của dự án */
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold;
            color: white;
        }
        .stats { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 1.5rem; 
            border-top: 1px solid #3d515a; 
            padding-top: 1rem; 
            margin-bottom: 1.5rem;
        }
        .stat-item { text-align: center; }
        .stat-item strong { display: block; font-size: 1.2rem; color: #4caf50; }
        .stat-item span { font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="profile-info">
            <div class="avatar-circle">G</div>
            
            <h2 style="margin-bottom: 0;" th:text="${loggedInUser != null ? loggedInUser : 'Giáp Giáp'}">Giáp Giáp</h2>
            <p style="color: #aaa; font-size: 0.9rem;">Hạng: Chưa xếp hạng</p>
            
            <div class="stats">
                <div class="stat-item">
                    <strong>10</strong>
                    <span>Thắng</span>
                </div>
                <div class="stat-item">
                    <strong>5</strong>
                    <span>Thua</span>
                </div>
                <div class="stat-item">
                    <strong>1200</strong>
                    <span>Elo</span>
                </div>
            </div>
            
            <button class="btn-submit" style="background-color: #3d515a;">Chỉnh sửa hồ sơ</button>
            
            <a th:href="@{/}" style="display:block; margin-top: 15px; color: #4caf50; text-decoration: none; font-weight: bold;">
                ← Quay lại bàn cờ
            </a>
        </div>
    </div>
</body>
</html>
