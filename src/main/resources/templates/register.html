<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký - Chess Pro</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-container">
    <h2>Đăng Ký</h2>

    <div th:if="${error}" style="color: #f44336; background: rgba(244, 67, 54, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid rgba(244, 67, 54, 0.3); text-align: center;">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post" id="registerForm">
        <div class="form-group">
            <label>Tên người dùng</label>
            <input type="text" name="username" id="regUsername" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="regPassword" required>
                <button type="button" class="eye-btn" onclick="togglePassword('regPassword', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <div class="password-wrapper">
                <input type="password" name="confirmPassword" id="confirmPassword" required>
                <button type="button" class="eye-btn" onclick="togglePassword('confirmPassword', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-submit">Tạo Tài Khoản</button>
    </form>
    <div class="auth-footer">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
