spring.application.name=chessgame

server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Default profile: expect DB config from environment (Render-friendly).
# Examples:
# - JDBC_DATABASE_URL=jdbc:mysql://host:3306/db?useSSL=false&serverTimezone=UTC
# - JDBC_DATABASE_USERNAME=...
# - JDBC_DATABASE_PASSWORD=...
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/chessgame?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
